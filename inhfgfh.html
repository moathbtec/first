<html>
<head>
<script>
function validateEntry() {
    var x = document.forms["validation"]["forename"].value;
    if (x == null || x == "") {
        alert("مربع الادخال فارغ او لم تقم بادخال اي شيء");
        return false;
    }
}
</script>
</head>

<body>

<form name="validation" action="validation_blank_field.asp" 
onsubmit="return validateEntry()" method="post" >

    Forename: <input type="text" name="forename">
    <input type="submit" value="ارسال">
</form>
</body>
</html>
